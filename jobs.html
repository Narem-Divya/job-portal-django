<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1{
            text-align: center;
            color: #333;
        }

        .search-box{
            text-align: center;
            margin-bottom: 20px;
        }

        .search-box input{
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .search-box button{
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .job-card{
            background: white;
            width: 700px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
        }

        .apply-btn{
            background: green;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Available Jobs</h1>

    <div class="search-box">
        <form method="GET">
            <input type="text" name="q" placeholder="Search jobs...">
            <button type="submit">Search</button>
        </form>
    </div>

    {% for job in jobs %}
    <div class="job-card">

        <h2>{{ job.title }}</h2>

        <p>
            <strong>Company:</strong>
            {{ job.company }}
        </p>

        <p>
            <strong>Location:</strong>
            {{ job.location }}
        </p>

        <a href="/jobs/apply/" class="apply-btn">
            Apply Now
        </a>

    </div>
    {% endfor %}

</body>
</html>
